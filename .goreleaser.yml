version: 2
builds:
  - id: gh-pr-summarizer
    binary: gh-pr-summarizer
    main: ./cmd/gh-pr-summarizer/main.go
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

universal_binaries:
  - id: gh-pr-summarizer
    replace: true
    name_template: "gh-pr-summarizer"

checksum:
  name_template: 'checksums.txt'

release:
  github:
    owner: simonmittag
    name: gh-pr-summarizer
